# Publishes to npm when you push to the default branch, but only if that
# package.json version is not already published (avoids duplicate-version errors).
#
# Setup (one-time):
# 1. npmjs.com → Access Tokens → create a Granular Access Token (or Automation)
#    with permission to publish this package.
# 2. GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#    Name: NPM_TOKEN   Value: <the token>
#
# Workflow: bump "version" in package.json, commit, push to master/main.

name: Publish to npm

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Test and typecheck
        run: npm test && npm run typecheck

      - name: Determine if publish is needed
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if REMOTE=$(npm view "ai-i18n@${VERSION}" version 2>/dev/null); then
            if [ "${REMOTE}" = "${VERSION}" ]; then
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              echo "Version ${VERSION} is already on npm; skipping publish."
            else
              echo "skip=false" >> "${GITHUB_OUTPUT}"
            fi
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
            echo "Version ${VERSION} not on npm yet (or could not query registry); will try publish."
          fi

      - name: Publish to npm
        if: steps.meta.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::Missing NPM_TOKEN repository secret. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          npm publish
